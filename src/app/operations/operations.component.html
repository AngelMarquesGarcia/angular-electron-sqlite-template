<div style="padding: 1rem; border: 1px solid #ccc; border-radius: 0.5rem; max-width: 400px;">
  <h3>Simple Calculator</h3>

  <div style="display: flex; gap: 0.5rem; align-items: center; margin: 1rem 0;">
    <input
      type="number"
      [(ngModel)]="num1"
      placeholder="Number 1"
      style="padding: 0.5rem; border: 1px solid #999; border-radius: 0.25rem;"
    />

    <select
      [(ngModel)]="operator"
      style="padding: 0.5rem; border: 1px solid #999; border-radius: 0.25rem;"
    >
      <option value="+">+</option>
      <option value="-">-</option>
      <option value="*">*</option>
      <option value="/">/</option>
    </select>

    <input
      type="number"
      [(ngModel)]="num2"
      placeholder="Number 2"
      style="padding: 0.5rem; border: 1px solid #999; border-radius: 0.25rem;"
    />

    <button
      (click)="calculate()"
      style="padding: 0.5rem 1rem; background-color: #007bff; color: white; border: none; border-radius: 0.25rem; cursor: pointer;"
    >
      =
    </button>

    <span style="font-weight: bold; min-width: 80px;">
      {{ result !== null ? result : '-' }}
    </span>
  </div>
</div>
